name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp *.html _site/
          cp styles.min.css script.js favicon.ico robots.txt sitemap.xml _site/
          cp -R assets _site/assets
          touch _site/.nojekyll

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add _gh_pages origin/gh-pages
          find _gh_pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R _site/. _gh_pages/
          cd _gh_pages
          git add -A
          git commit -m "Publish site from ${GITHUB_SHA}" || exit 0
          git push origin HEAD:gh-pages
